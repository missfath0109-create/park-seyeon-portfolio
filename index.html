<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARK SEYEON | Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1420;
  --gold: #d4b96a;
  --gold2: #ead98c;
  --gold3: #f5ecb8;
  --gold-glow: rgba(212,185,106,0.35);
  --blue2: #7ec8e3;
  --ink1: #ede6d3;
  --ink2: #c8bfa0;
  --ink3: #8a7f63;
  --ink4: #4a4535;
  --border: rgba(212,185,106,0.3);
  --border2: rgba(212,185,106,0.15);
  --shadow: 0 8px 32px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Noto Sans KR',sans-serif;color:var(--ink1);background:var(--bg);height:100%;overflow:hidden;}
#bgLayer{position:fixed;inset:0;z-index:0;background:url('bg.jpg') center/cover no-repeat;filter:blur(6px) saturate(0.7) brightness(0.4);transform:scale(1.06);}
#bgOverlay{position:fixed;inset:0;z-index:1;background:linear-gradient(135deg,rgba(10,14,24,0.62) 0%,rgba(14,20,32,0.55) 100%);}
#app{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#hud{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 48px;background:linear-gradient(180deg,rgba(10,14,24,0.95) 0%,rgba(14,20,32,0.88) 100%);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);position:relative;z-index:100;}
.hud-line{position:absolute;bottom:0;left:48px;right:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);opacity:0.5;}
.hud-diamond{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:9px;height:9px;background:var(--gold2);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);box-shadow:0 0 8px var(--gold2);}
.hud-left{display:flex;align-items:center;gap:16px;}
.hud-icon{width:38px;height:38px;border:1px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;background:rgba(212,185,106,0.1);color:var(--gold2);}
.hud-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;letter-spacing:0.5em;text-transform:uppercase;color:var(--ink1);}
.hud-subtitle{font-size:10px;color:var(--ink3);letter-spacing:0.2em;text-transform:uppercase;margin-top:2px;}
.hud-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--ink2);border:1px solid var(--border2);border-radius:2px;background:rgba(255,255,255,0.04);cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.hud-btn:hover{color:var(--gold2);border-color:var(--border);background:rgba(212,185,106,0.08);}
#main{display:grid;grid-template-columns:240px 1fr;flex:1;min-height:0;overflow:hidden;}
#leftNav{background:linear-gradient(180deg,rgba(10,14,24,0.95),rgba(14,20,32,0.92));border-right:1px solid var(--border2);display:flex;flex-direction:column;padding:36px 0;height:100%;overflow-y:auto;overflow-x:hidden;}
.nav-label{font-size:13px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);padding:0 28px 10px;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:14px;padding:15px 28px;font-family:'Noto Serif KR',serif;font-size:15px;font-weight:500;letter-spacing:0.06em;color:var(--ink3);cursor:pointer;transition:all .25s;position:relative;border:none;background:none;width:100%;text-align:left;}
.nav-item .nav-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink4);width:20px;flex-shrink:0;}
.nav-item:hover{color:var(--ink1);background:rgba(212,185,106,0.06);}
.nav-item.active{color:var(--gold2);background:linear-gradient(90deg,rgba(212,185,106,0.12),transparent);}
.nav-item.active::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:3px;background:linear-gradient(180deg,var(--gold2),var(--gold));border-radius:0 2px 2px 0;box-shadow:2px 0 8px var(--gold-glow);}
.nav-item.active .nav-num{color:var(--gold);}
.nav-item.active::after{content:'◆';position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:6px;color:var(--gold);opacity:0.7;}
.nav-bottom{margin-top:auto;padding:0 20px;}
.nav-version{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ink4);text-align:center;padding:14px 0;border-top:1px solid var(--border2);letter-spacing:0.1em;}
#content{display:grid;grid-template-columns:300px 1fr;gap:32px;padding:40px 48px;align-items:start;height:100%;overflow-y:auto;overflow-x:hidden;}
#content.wide{grid-template-columns:1fr;padding:48px 64px;}
#charPanel{position:sticky;top:0;display:flex;flex-direction:column;gap:16px;}
.char-frame{background:linear-gradient(180deg,rgba(28,37,64,0.8),rgba(14,20,32,0.95));border:1px solid var(--border);border-radius:3px;aspect-ratio:3/4;position:relative;overflow:hidden;box-shadow:var(--shadow),inset 0 1px 0 rgba(212,185,106,0.15);}
.char-frame-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(212,185,106,0.12) 0%,transparent 65%),radial-gradient(ellipse at 50% 20%,rgba(74,158,202,0.08) 0%,transparent 50%);}
.char-corner{position:absolute;width:22px;height:22px;z-index:3;}
.char-corner svg{color:var(--gold);opacity:0.8;}
.char-corner.tl{top:12px;left:12px;}
.char-corner.tr{top:12px;right:12px;transform:scaleX(-1);}
.char-corner.bl{bottom:12px;left:12px;transform:scaleY(-1);}
.char-corner.br{bottom:12px;right:12px;transform:scale(-1,-1);}
.char-top-diamond{position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:9px;height:9px;background:var(--gold);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);box-shadow:0 0 8px var(--gold);z-index:4;}
.char-rarity{position:absolute;bottom:0;left:0;right:0;padding:18px 18px 16px;background:linear-gradient(0deg,rgba(10,14,24,0.95),transparent);z-index:2;display:flex;flex-direction:column;align-items:flex-start;}
.char-stars{display:flex;gap:5px;padding:10px 12px;}
.char-star{font-size:18px;color:var(--gold2);text-shadow:0 0 8px var(--gold);}
.char-star.off{color:var(--ink4);text-shadow:none;}
.char-placeholder{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.char-placeholder-icon{color:var(--gold);opacity:0.3;}
.char-placeholder-text{font-size:11px;color:var(--ink3);letter-spacing:0.08em;}
.name-plate{background:linear-gradient(135deg,rgba(28,37,64,0.9),rgba(14,20,32,0.95));border:1px solid var(--border);border-radius:3px;padding:20px 22px;position:relative;overflow:hidden;box-shadow:var(--shadow),inset 0 1px 0 rgba(212,185,106,0.12);}
.name-plate::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);}
.np-kr{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:700;color:var(--ink1);}
.np-en{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:500;color:var(--ink3);letter-spacing:0.3em;text-transform:uppercase;margin-top:3px;}
.np-level{position:absolute;top:20px;right:22px;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold2);text-shadow:0 0 10px var(--gold-glow);}
.np-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;}
.np-tag{padding:3px 10px;font-size:10px;font-weight:500;letter-spacing:0.06em;border-radius:1px;border:1px solid;}
.np-tag.el{color:var(--blue2);border-color:rgba(74,158,202,0.4);background:rgba(74,158,202,0.08);}
.np-tag.role{color:var(--gold2);border-color:rgba(212,185,106,0.4);background:rgba(212,185,106,0.08);}
.np-tag.exp{color:var(--ink2);border-color:var(--border2);background:rgba(255,255,255,0.04);}
.catchphrase{background:linear-gradient(135deg,rgba(28,37,64,0.7),rgba(14,20,32,0.85));border:1px solid var(--border2);border-left:2px solid var(--gold);border-radius:3px;padding:14px 18px;font-size:12.5px;line-height:1.8;color:var(--ink2);font-family:'Noto Serif KR',serif;}
#infoPanel{display:flex;flex-direction:column;gap:20px;animation:fadeUp .4s cubic-bezier(.16,1,.3,1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.card{background:linear-gradient(180deg,rgba(28,37,64,0.75),rgba(14,20,32,0.9));border:1px solid var(--border);border-radius:3px;padding:24px 26px;position:relative;overflow:hidden;box-shadow:var(--shadow),inset 0 1px 0 rgba(212,185,106,0.1);}
.card::before{content:'';position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,185,106,0.3),transparent);}
.card-title{display:flex;align-items:center;gap:10px;font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;color:var(--gold2);letter-spacing:0.1em;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border2);position:relative;}
.card-title::after{content:'';position:absolute;bottom:-1px;left:0;width:36px;height:1px;background:var(--gold);box-shadow:0 0 4px var(--gold);}
.card-title svg{color:var(--gold);flex-shrink:0;width:16px;height:16px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.two-col-divider{border-left:1px dashed var(--border2);padding-left:24px;}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px dashed rgba(212,185,106,0.1);}
.stat-row:last-child{border-bottom:none;}
.stat-lbl{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink2);}
.stat-lbl svg{color:var(--gold);opacity:0.7;flex-shrink:0;}
.stat-val{font-family:'Noto Sans KR','JetBrains Mono',monospace;font-size:11.5px;color:var(--ink1);text-align:right;}
.edu-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px dashed rgba(212,185,106,0.1);}
.edu-row:last-child{border-bottom:none;}
.edu-main{display:flex;flex-direction:column;gap:3px;}
.edu-school{font-size:13.5px;font-weight:600;color:var(--ink1);font-family:'Noto Serif KR',serif;}
.edu-major{font-size:12px;color:var(--ink3);}
.edu-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.edu-period{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gold);}
.edu-note{font-size:11.5px;color:var(--ink3);}
.skills-list{display:flex;flex-direction:column;gap:9px;}
.skill-row{display:flex;align-items:center;gap:10px;}
.skill-name{font-size:11.5px;color:var(--ink2);width:90px;flex-shrink:0;}
.skill-track{flex:1;height:5px;background:rgba(255,255,255,0.05);border:1px solid rgba(212,185,106,0.15);overflow:hidden;}
.skill-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold3));transform-origin:left;animation:barGrow .7s cubic-bezier(.16,1,.3,1) backwards;box-shadow:0 0 6px rgba(212,185,106,0.4);}
@keyframes barGrow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
.cert-list{display:flex;flex-direction:column;gap:9px;}
.cert-item{display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px dashed rgba(212,185,106,0.1);}
.cert-item:last-child{border-bottom:none;}
.cert-name{font-size:12px;color:var(--gold2);font-weight:500;}
.cert-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink3);flex-shrink:0;}
.timeline-item{padding:14px 0;border-bottom:1px dashed var(--border2);}
.timeline-item:last-child{border-bottom:none;padding-bottom:0;}
.tl-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px;}
.tl-title{font-family:'Noto Serif KR',serif;font-size:13.5px;font-weight:700;color:var(--ink1);}
.tl-period{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);flex-shrink:0;margin-top:2px;letter-spacing:0.04em;}
.tl-sub{font-size:11.5px;color:var(--ink3);margin-bottom:5px;}
.tl-desc{font-size:12px;line-height:1.7;color:var(--ink2);}
.about-body p{font-size:13.5px;line-height:1.9;color:var(--ink2);margin-bottom:16px;}
.about-body p:last-child{margin-bottom:0;}
.about-sub{font-family:'Noto Serif KR',serif;font-size:15.5px;font-weight:700;color:var(--gold2);letter-spacing:0.03em;line-height:1.6;margin:30px 0 14px;padding-left:14px;border-left:3px solid var(--gold);text-shadow:0 0 10px var(--gold-glow);}
.about-sub:first-child{margin-top:0;}
.action-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;background:linear-gradient(180deg,rgba(212,185,106,0.22),rgba(143,100,20,0.35));border:1px solid var(--gold);border-radius:2px;font-family:'Noto Serif KR',serif;font-size:13px;font-weight:700;color:var(--gold2);letter-spacing:0.15em;cursor:pointer;text-decoration:none;transition:all .25s;position:relative;box-shadow:0 0 16px rgba(212,185,106,0.1),inset 0 1px 0 rgba(248,235,180,0.15);}
.action-btn::before,.action-btn::after{content:'◆';position:absolute;top:50%;transform:translateY(-50%);font-size:7px;color:var(--gold);opacity:.6;}
.action-btn::before{left:16px;}.action-btn::after{right:16px;}
.action-btn:hover{background:linear-gradient(180deg,rgba(234,217,140,0.32),rgba(212,185,106,0.45));transform:translateY(-1px);}
.copyright{margin-top:28px;padding:16px 0;border-top:1px solid var(--border2);text-align:center;font-size:11px;color:var(--ink4);line-height:1.7;letter-spacing:0.03em;}
.page-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border2);position:relative;}
.page-header::after{content:'';position:absolute;bottom:-1px;left:0;width:48px;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));box-shadow:0 0 6px var(--gold);}
.page-h-name{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;color:var(--ink1);}
.page-h-en{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--ink3);letter-spacing:0.25em;text-transform:uppercase;margin-top:2px;}
.page-h-tag{padding:4px 12px;font-size:10px;font-weight:500;letter-spacing:0.1em;color:var(--blue2);border:1px solid rgba(74,158,202,0.35);border-radius:1px;background:rgba(74,158,202,0.07);}
.pf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;}
.pf-card{background:linear-gradient(180deg,rgba(28,37,64,0.75),rgba(14,20,32,0.9));border:1px solid var(--border2);border-radius:3px;overflow:hidden;cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.pf-card:hover{transform:translateY(-5px);border-color:var(--gold2);box-shadow:0 16px 32px rgba(0,0,0,0.5),0 0 16px rgba(212,185,106,0.15);}
.pf-thumb{aspect-ratio:16/9;background:linear-gradient(135deg,rgba(28,37,64,0.9),rgba(10,14,24,0.95));position:relative;overflow:hidden;border-bottom:1px solid var(--border2);}
.pf-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.16,1,.3,1);}
.pf-card:hover .pf-thumb img{transform:scale(1.05);}
.pf-badge{position:absolute;top:8px;left:8px;padding:3px 9px;font-size:9px;font-weight:500;letter-spacing:0.1em;color:var(--gold2);border:1px solid var(--border);border-radius:1px;background:rgba(10,14,24,0.88);backdrop-filter:blur(8px);z-index:1;}
.pf-dl-icon{position:absolute;bottom:8px;right:8px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:rgba(10,14,24,0.88);border:1px solid var(--border);border-radius:1px;color:var(--gold2);z-index:1;}
.pf-thumb-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.pf-ph-icon{color:var(--gold);opacity:0.25;}
.pf-ph-text{font-family:'Noto Serif KR',serif;font-size:11px;color:var(--ink3);text-align:center;padding:0 12px;}
.pf-info{padding:14px 16px 16px;display:flex;flex-direction:column;gap:4px;flex:1;}
.pf-title{font-family:'Noto Serif KR',serif;font-size:13.5px;font-weight:700;color:var(--ink1);line-height:1.4;}
.pf-desc{font-size:11px;color:var(--ink3);line-height:1.6;margin-top:2px;}
.pf-detail{display:flex;flex-direction:column;gap:18px;animation:fadeUp .4s cubic-bezier(.16,1,.3,1);}
.pf-detail-hd{display:flex;align-items:center;gap:12px;padding:18px 22px;background:linear-gradient(180deg,rgba(28,37,64,0.8),rgba(14,20,32,0.95));border:1px solid var(--border);border-radius:3px;}
.pf-back{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;font-size:12px;font-weight:500;color:var(--ink2);border:1px solid var(--border2);border-radius:1px;background:rgba(255,255,255,0.04);cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.pf-back:hover{color:var(--gold2);border-color:var(--border);transform:translateX(-2px);}
.pf-detail-title{flex:1;font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--ink1);}
.pf-dl-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;background:linear-gradient(180deg,rgba(212,185,106,0.28),rgba(143,100,20,0.4));color:var(--gold2);border:1px solid var(--gold);border-radius:1px;font-size:12px;font-weight:700;font-family:'Noto Serif KR',serif;text-decoration:none;transition:all .25s;letter-spacing:0.1em;cursor:pointer;}
.pf-dl-btn:hover{background:linear-gradient(180deg,rgba(234,217,140,0.38),rgba(212,185,106,0.5));transform:translateY(-1px);}
.pf-preview-wrap{width:100%;border:1px solid rgba(212,185,106,0.1);border-radius:2px;overflow:hidden;background:rgba(14,20,32,0.6);}
.pf-preview-wrap iframe{display:block;width:100%;height:82vh;border:none;}
.pf-preview-wrap img{display:block;width:100%;height:auto;}
.pf-pdf-mobile{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px;}
.pf-pdf-mobile img{width:100%;height:auto;border-radius:1px;}
.pf-pdf-open{align-self:center;}
.pf-notice{margin-bottom:16px;padding:12px 16px;font-size:12.5px;line-height:1.7;color:var(--ink2);background:rgba(212,185,106,0.08);border:1px solid var(--border2);border-radius:2px;word-break:break-all;}
.pf-notice a{color:var(--gold2);text-decoration:underline;}
.pf-sheet-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.pf-sheet-tab{padding:6px 12px;font-size:11px;font-weight:500;color:var(--ink2);border:1px solid var(--border2);border-radius:1px;background:rgba(255,255,255,0.04);cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.pf-sheet-tab:hover{color:var(--gold2);border-color:var(--border);}
.pf-sheet-tab.active{color:var(--gold2);border-color:var(--gold);background:rgba(212,185,106,0.18);}
.pf-sheet-msg{font-size:12px;color:var(--ink3);padding:6px 0;}
.pf-sheet-table{width:100%;max-height:70vh;overflow:auto;border:1px solid var(--border2);border-radius:2px;background:#fff;}
.pf-sheet-table table{border-collapse:collapse;font-size:11px;color:#222;}
.pf-sheet-table td,.pf-sheet-table th{border:1px solid #ddd;padding:3px 7px;white-space:nowrap;}
.pf-preview-ph{padding:60px 20px;text-align:center;color:var(--ink3);font-size:12.5px;line-height:1.9;background:linear-gradient(180deg,rgba(28,37,64,0.75),rgba(14,20,32,0.9));border:1px solid var(--border);border-radius:3px;}
.pf-preview-ph svg{margin:0 auto 14px;display:block;color:var(--gold);opacity:0.25;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.03);}
::-webkit-scrollbar-thumb{background:rgba(212,185,106,0.3);border-radius:2px;}
@media(max-width:1200px){.two-col{grid-template-columns:1fr;}.two-col-divider{border-left:none;padding-left:0;border-top:1px dashed var(--border2);padding-top:20px;}}
@media(max-width:1100px){
  html,body{height:auto;overflow:auto;}
  #app{height:auto;overflow:visible;}
  #main{grid-template-columns:1fr;height:auto;overflow:visible;}

function argbToCss(argb){
  if(!argb) return null;
  const hex = argb.length===8 ? argb.slice(2) : argb;
  if(hex.toUpperCase()==='000000' && argb.length===8 && argb.slice(0,2)==='00') return null;

  const style = BORDER_STYLE[side.style] || 'solid';
  return `${width} ${style} ${color}`;
}

  if(v instanceof Date) return v.toLocaleDateString();
  if(typeof v==='number'){
    return String(Math.round(v*10000)/10000);
  }
  return String(v);
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function cellStyleToCss(cell){
  const styles=[];
  const fill = cell.fill;
  if(fill && fill.type==='pattern' && fill.pattern==='solid' && fill.fgColor){
    const bg = argbToCss(fill.fgColor.argb);
    if(bg) styles.push(`background-color:${bg}`);
  }
  const font = cell.font;
  if(font){
    if(font.bold) styles.push('font-weight:bold');
    if(font.italic) styles.push('font-style:italic');
    if(font.underline) styles.push('text-decoration:underline');
    if(font.color && font.color.argb){
      const c = argbToCss(font.color.argb);
      if(c) styles.push(`color:${c}`);
    }
    if(font.size) styles.push(`font-size:${font.size}px`);
  }
  const align = cell.alignment;
  if(align){
    if(align.horizontal) styles.push(`text-align:${align.horizontal}`);
    if(align.vertical) styles.push(`vertical-align:${align.vertical==='middle'?'middle':align.vertical}`);
    if(align.wrapText) styles.push('white-space:normal');
  }
  const border = cell.border;
  if(border){
    ['top','bottom','left','right'].forEach(side=>{
      const css = border[side] && borderSideToCss(border[side]);
      if(css) styles.push(`border-${side}:${css}`);
    });
  }
  return styles.join(';');
}
function colToNum(col){
  let n=0;
  for(let i=0;i<col.length;i++) n = n*26 + (col.charCodeAt(i)-64);
  return n;
}
function parseAddr(addr){
  const m = addr.match(/^([A-Z]+)(\d+)$/);
  return {col:colToNum(m[1]), row:parseInt(m[2],10)};
}
function worksheetToHtml(ws){
  const mergeSpans = {};
  const mergeSkip = new Set();
  (ws.model.merges||[]).forEach(range=>{
    const [a,b] = range.split(':');
    const s = parseAddr(a), e = parseAddr(b);
    mergeSpans[`${s.row}_${s.col}`] = {rowspan:e.row-s.row+1, colspan:e.col-s.col+1};
    for(let r=s.row;r<=e.row;r++) for(let c=s.col;c<=e.col;c++){
      if(r===s.row && c===s.col) continue;
      mergeSkip.add(`${r}_${c}`);
    }
  });
  const colCount = ws.columnCount;
  let colgroup = '<colgroup>';
  for(let c=1;c<=colCount;c++){
    const col = ws.getColumn(c);
    const w = col.width ? Math.round(col.width*7) : 64;
    colgroup += `<col style="width:${w}px">`;
  }
  colgroup += '</colgroup>';
  let html = `<table>${colgroup}`;
  for(let r=1;r<=ws.rowCount;r++){
    const row = ws.getRow(r);
    const h = row.height ? `height:${Math.round(row.height*1.333)}px;` : '';
    html += `<tr style="${h}">`;
    for(let c=1;c<=colCount;c++){
      const key = `${r}_${c}`;
      if(mergeSkip.has(key)) continue;
      const cell = row.getCell(c);
      const span = mergeSpans[key];
      const attrs = span ? ` rowspan="${span.rowspan}" colspan="${span.colspan}"` : '';
      html += `<td${attrs} style="${cellStyleToCss(cell)}">${escapeHtml(cellValueText(cell))}</td>`;
    }
    html += '</tr>';
  }
  html += '</table>';
  return html;
}
async function loadSheetView(p){
  const tabsEl = document.getElementById('pfSheetTabs');
  const tableEl = document.getElementById('pfSheetTable');
  if(!tabsEl || !tableEl) return;
  try{
    let wb = sheetCache[p.dl];
    if(!wb){
      const res = await fetch(p.dl);
      const buf = await res.arrayBuffer();
      wb = new ExcelJS.Workbook();
      await wb.xlsx.load(buf);
      sheetCache[p.dl] = wb;
    }
    const renderSheet = name=>{
      const ws = wb.getWorksheet(name);
      tableEl.innerHTML = worksheetToHtml(ws);
      tabsEl.querySelectorAll('.pf-sheet-tab').forEach(b=>b.classList.toggle('active', b.dataset.sheet===name));
    };
    const names = wb.worksheets.map(ws=>ws.name);
    tabsEl.innerHTML = names.map(name=>`<button class="pf-sheet-tab" data-sheet="${name}">${name}</button>`).join('');
    tabsEl.querySelectorAll('.pf-sheet-tab').forEach(b=>b.addEventListener('click',()=>renderSheet(b.dataset.sheet)));
    renderSheet(names[0]);
  } catch(err){
    tabsEl.innerHTML = '';
    tableEl.innerHTML = `<div class="pf-preview-ph">시트를 불러오지 못했습니다.</div>`;
  }
}
document.getElementById('leftNav').addEventListener('click',e=>{
  const btn=e.target.closest('.nav-item');
  if(btn) switchTab(btn.dataset.tab);
});
document.getElementById('homeBtn').addEventListener('click',()=>switchTab('basic'));
infoPanelEl.addEventListener('click',e=>{
  const pf=e.target.closest('[data-pf]');
  if(pf){curPF=parseInt(pf.dataset.pf);switchTab('portfolio');return;}
  const back=e.target.closest('[data-back]');
  if(back){curPF=null;switchTab('portfolio');return;}
  const stab=e.target.closest('[data-sheetimg]');
  if(stab){
    const img=document.getElementById('pfSheetImg');
    if(img) img.src=stab.dataset.sheetimg;
    stab.parentElement.querySelectorAll('.pf-sheet-tab').forEach(b=>b.classList.toggle('active',b===stab));
    return;
  }
  const dlBtn=e.target.closest('[data-dl]');
  if(dlBtn){
    const fileName = dlBtn.dataset.dlname || dlBtn.dataset.dl;
    logDownload(fileName, '포트폴리오');
    const a = document.createElement('a');
    a.href = dlBtn.dataset.dl;
    a.download = dlBtn.dataset.dlname || dlBtn.dataset.dl;
    a.click();
  }
});
switchTab('basic');

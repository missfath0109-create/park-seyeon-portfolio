<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARK SEYEON | Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Gowun+Dodum&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

  <style>
    :root {
      --bg-base: #1A2438;
      --bg-tint: #243152;
      --bg-deep: #0F1626;
      --panel: rgba(25, 35, 55, 0.92);
      --panel-soft: rgba(35, 47, 73, 0.75);
      --panel-hover: rgba(40, 55, 85, 0.92);
      --ink-1: #F0E4C5;
      --ink-2: #D9CBA3;
      --ink-3: #A89A78;
      --ink-4: #6B6650;
      --gold: #D4A847;
      --gold-bright: #F2C46D;
      --gold-deep: #8F6F1F;
      --gold-soft: rgba(212, 168, 71, 0.15);
      --blue-vivid: #5BAEE0;
      --blue-deep: #2D5A8C;
      --border: rgba(212, 168, 71, 0.4);
      --border-soft: rgba(212, 168, 71, 0.2);
      --border-bright: rgba(242, 196, 109, 0.6);
      --shadow-soft: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(212, 168, 71, 0.15) inset;
      --shadow-glow: 0 0 16px rgba(212, 168, 71, 0.25);
      --bg-warm-1: var(--bg-base);
      --bg-warm-2: var(--bg-tint);
      --bg-warm-3: var(--bg-deep);
      --accent: var(--gold);
      --accent-deep: var(--gold-deep);
      --accent-soft: var(--gold-soft);
      --accent-gold: var(--gold);
      --accent-gold-deep: var(--gold-deep);
      --accent-blue: var(--blue-vivid);
      --blue-mid: var(--blue-deep);
      --blue-soft: rgba(91, 174, 224, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Noto Sans KR', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink-1);
      background:
        radial-gradient(ellipse at top left, rgba(45, 70, 120, 0.4) 0%, transparent 60%),
        radial-gradient(ellipse at bottom right, rgba(15, 22, 38, 0.8) 0%, transparent 60%),
        linear-gradient(135deg, var(--bg-base) 0%, var(--bg-deep) 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(212, 168, 71, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(91, 174, 224, 0.05) 0%, transparent 50%);
      z-index: 0;
    }

    .game-frame {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: linear-gradient(180deg, rgba(25, 35, 55, 0.85) 0%, rgba(15, 22, 38, 0.85) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(212, 168, 71, 0.15);
      margin-bottom: 24px;
      position: relative;
    }

    .top-bar::before {
      content: '';
      position: absolute;
      top: 4px; left: 16px; right: 16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }

    .top-bar::after {
      content: '◆';
      position: absolute;
      top: -1px; right: 50%;
      transform: translateX(50%);
      color: var(--gold);
      font-size: 8px;
      text-shadow: 0 0 8px var(--gold);
    }

    .top-bar-title {
      font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.4em;
      color: var(--ink-1);
      text-transform: uppercase;
      position: relative;
      padding-left: 20px;
      text-shadow: 0 0 12px rgba(240, 228, 197, 0.3);
    }
    .top-bar-title::before {
      content: '◆';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-55%);
      color: var(--gold);
      font-size: 12px;
      text-shadow: 0 0 8px var(--gold);
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .home-btn {
      width: 36px; height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(25, 35, 55, 0.6);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--gold);
    }
    .home-btn:hover {
      background: rgba(45, 60, 95, 0.8);
      border-color: var(--gold-bright);
      box-shadow: var(--shadow-glow);
      transform: translateY(-1px);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 140px 1.1fr 1.3fr;
      gap: 24px;
      flex: 1;
      min-height: 620px;
    }

    .side-menu {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 16px 8px;
    }

    .menu-item {
      padding: 14px 8px;
      text-align: center;
      font-family: 'Noto Serif KR', serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-3);
      background: transparent;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    .menu-item:hover {
      color: var(--ink-1);
      background: rgba(212, 168, 71, 0.08);
    }
    .menu-item.active {
      background: linear-gradient(135deg, rgba(212, 168, 71, 0.15) 0%, rgba(212, 168, 71, 0.05) 100%);
      color: var(--gold-bright);
      font-weight: 700;
      box-shadow: inset 0 0 0 1px var(--border);
      text-shadow: 0 0 10px rgba(242, 196, 109, 0.4);
    }
    .menu-item.active::before {
      content: '';
      position: absolute;
      left: -3px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 24px;
      background: linear-gradient(180deg, var(--gold-bright), var(--gold));
      border-radius: 4px 0 0 4px;
      box-shadow: 0 0 8px var(--gold);
    }
    .menu-item.active::after {
      content: '◆';
      position: absolute;
      right: 6px; top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 6px;
      opacity: 0.6;
    }

    .character-display {
      background: linear-gradient(180deg, rgba(35, 47, 73, 0.7) 0%, rgba(20, 30, 50, 0.85) 100%);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
      aspect-ratio: 3 / 4;
      align-self: start;
      width: 100%;
    }

    .character-display::after {
      content: '◆';
      position: absolute;
      top: 6px; left: 50%;
      transform: translateX(-50%);
      color: var(--gold);
      font-size: 10px;
      text-shadow: 0 0 6px var(--gold);
      z-index: 3;
    }

    .character-display::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(212, 168, 71, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 28px; height: 28px;
      border: 1.5px solid var(--gold);
      opacity: 0.7;
      z-index: 2;
    }
    .corner.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
    .corner.tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
    .corner.bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
    .corner.br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

    .character-image {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      object-fit: cover;
      object-position: center top;
      position: relative;
      z-index: 1;
      background: var(--panel-soft);
    }

    .character-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      background: repeating-linear-gradient(
        135deg,
        rgba(212, 168, 71, 0.06),
        rgba(212, 168, 71, 0.06) 10px,
        rgba(212, 168, 71, 0.02) 10px,
        rgba(212, 168, 71, 0.02) 20px
      );
      border: 1px dashed var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--ink-3);
      position: relative;
      z-index: 1;
    }
    .character-placeholder svg { opacity: 0.5; color: var(--gold); }
    .character-placeholder .label {
      font-family: 'Noto Serif KR', serif;
      font-size: 13px; font-weight: 500;
      color: var(--ink-2);
      letter-spacing: 0.08em;
    }
    .character-placeholder .hint { font-size: 11px; color: var(--ink-3); opacity: 0.7; }

    .info-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .info-card {
      background: linear-gradient(180deg, rgba(35, 47, 73, 0.7) 0%, rgba(20, 30, 50, 0.85) 100%);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 18px 20px;
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(212, 168, 71, 0.1);
      position: relative;
    }

    .info-card::before {
      content: '';
      position: absolute;
      top: 6px; left: 12px; right: 12px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-soft), transparent);
      opacity: 0.6;
    }

    .name-card { padding: 22px 24px 18px; }
    .name-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .name-row .name {
      font-family: 'Noto Serif KR', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink-1);
      text-shadow: 0 0 12px rgba(240, 228, 197, 0.2);
    }
    .name-row .level {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--gold-bright);
      letter-spacing: 0.1em;
      text-shadow: 0 0 8px rgba(242, 196, 109, 0.4);
    }

    .stars { display: flex; gap: 3px; margin-bottom: 14px; }
    .stars .star {
      width: 14px; height: 14px;
      color: var(--gold-bright);
      filter: drop-shadow(0 0 4px rgba(242, 196, 109, 0.5));
    }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      padding: 4px 14px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 2px;
      letter-spacing: 0.08em;
      border: 1px solid var(--border);
      background: rgba(25, 35, 55, 0.6);
      color: var(--ink-2);
    }
    .tag.t-element { border-color: rgba(91, 174, 224, 0.5); color: var(--blue-vivid); }
    .tag.t-role { border-color: var(--border); color: var(--gold-bright); }
    .tag.t-experience { border-color: rgba(216, 203, 163, 0.4); color: var(--ink-2); }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-soft);
      position: relative;
    }
    .section-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 40px; height: 1px;
      background: var(--gold);
      box-shadow: 0 0 4px var(--gold);
    }
    .section-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--gold-bright);
      letter-spacing: 0.12em;
      text-shadow: 0 0 8px rgba(242, 196, 109, 0.3);
    }
    .section-action {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-3);
      padding: 3px 10px;
      background: rgba(25, 35, 55, 0.6);
      border: 1px solid var(--border-soft);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .section-action:hover { color: var(--gold-bright); border-color: var(--gold); }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      font-size: 13.5px;
      border-bottom: 1px dashed var(--border-soft);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { display: flex; align-items: center; gap: 10px; color: var(--ink-2); font-weight: 400; }
    .stat-icon { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; color: var(--gold); }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: var(--ink-1); letter-spacing: 0.02em; }
    .stat-value.email { color: var(--ink-1); }

    .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px 28px; }
    .skill-row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
    .skill-name { font-size: 13px; font-weight: 500; color: var(--ink-2); letter-spacing: 0.02em; width: 78px; flex-shrink: 0; }
    .skill-gauge { flex: 1; height: 6px; background: rgba(15, 22, 38, 0.6); border: 1px solid var(--border-soft); border-radius: 1px; overflow: hidden; position: relative; }
    .skill-gauge-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-bright) 100%);
      border-radius: 0;
      transform-origin: left center;
      animation: fillGauge 0.7s cubic-bezier(0.16, 1, 0.3, 1) backwards;
      box-shadow: 0 0 8px rgba(242, 196, 109, 0.5);
    }
    @keyframes fillGauge { from { transform: scaleX(0); } to { transform: scaleX(1); } }

    .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .skill-chip { padding: 5px 12px; font-size: 12px; font-weight: 500; background: var(--panel-soft); color: var(--ink-1); border: 1px solid var(--border-soft); border-radius: 8px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; }
    .cert-chip { padding: 5px 14px; font-size: 12px; font-weight: 500; background: rgba(25, 35, 55, 0.6); color: var(--gold-bright); border: 1px solid var(--border); border-radius: 2px; letter-spacing: 0.04em; }

    .description { font-size: 13.5px; line-height: 1.75; color: var(--ink-2); font-family: 'Noto Sans KR', sans-serif; }

    .timeline-item { padding: 14px 0; border-bottom: 1px dashed var(--border-soft); }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 12px; }
    .timeline-title { font-family: 'Noto Serif KR', serif; font-size: 14.5px; font-weight: 700; color: var(--ink-1); letter-spacing: -0.01em; }
    .timeline-period { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gold); font-weight: 500; flex-shrink: 0; letter-spacing: 0.05em; }
    .timeline-sub { font-size: 12.5px; color: var(--ink-3); margin-bottom: 6px; font-weight: 400; }
    .timeline-desc { font-size: 12.5px; line-height: 1.7; color: var(--ink-2); }

    .action-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 14px 20px;
      background: linear-gradient(180deg, rgba(212, 168, 71, 0.2) 0%, rgba(143, 111, 31, 0.3) 100%);
      color: var(--gold-bright);
      border: 1px solid var(--gold);
      border-radius: 2px;
      font-family: 'Noto Serif KR', serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.12em;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(242, 196, 109, 0.2), 0 0 12px rgba(212, 168, 71, 0.15);
      transition: all 0.25s; margin-top: 6px;
      text-shadow: 0 0 8px rgba(242, 196, 109, 0.4);
      position: relative;
    }
    .action-btn::before, .action-btn::after { content: '◆'; position: absolute; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 8px; opacity: 0.7; }
    .action-btn::before { left: 12px; }
    .action-btn::after { right: 12px; }
    .action-btn:hover { background: linear-gradient(180deg, rgba(242, 196, 109, 0.3) 0%, rgba(212, 168, 71, 0.4) 100%); box-shadow: inset 0 1px 0 rgba(242, 196, 109, 0.3), 0 0 20px rgba(212, 168, 71, 0.3); transform: translateY(-1px); }
    .action-btn:active { transform: translateY(0); }

    .content-grid.portfolio-mode { grid-template-columns: 140px 1fr; }
    .content-grid.portfolio-mode .character-display { display: none; }

    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
    .portfolio-item { background: linear-gradient(180deg, rgba(35, 47, 73, 0.7) 0%, rgba(20, 30, 50, 0.85) 100%); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; cursor: pointer; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; box-shadow: var(--shadow-soft); position: relative; }
    .portfolio-item:hover { transform: translateY(-4px); border-color: var(--gold-bright); box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4), 0 0 16px rgba(212, 168, 71, 0.2); }
    .portfolio-thumbnail { aspect-ratio: 16/10; background: linear-gradient(135deg, var(--bg-tint) 0%, var(--bg-deep) 100%); position: relative; overflow: hidden; border-bottom: 1px solid var(--border-soft); }
    .portfolio-thumbnail img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .portfolio-item:hover .portfolio-thumbnail img { transform: scale(1.06); }
    .portfolio-thumbnail-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--ink-3); padding: 16px; text-align: center; }
    .portfolio-thumbnail-placeholder .ph-icon { opacity: 0.5; color: var(--gold); }
    .portfolio-thumbnail-placeholder .ph-text { font-family: 'Noto Serif KR', serif; font-size: 12px; font-weight: 500; color: var(--ink-2); letter-spacing: 0.04em; }
    .portfolio-badge { position: absolute; top: 10px; left: 10px; padding: 3px 10px; background: rgba(15, 22, 38, 0.85); border: 1px solid var(--gold); border-radius: 2px; font-family: 'Noto Sans KR', sans-serif; font-size: 10px; font-weight: 500; color: var(--gold-bright); letter-spacing: 0.1em; backdrop-filter: blur(8px); text-shadow: 0 0 6px rgba(242, 196, 109, 0.4); }
    .portfolio-info { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .portfolio-title { font-family: 'Noto Serif KR', serif; font-size: 14.5px; font-weight: 700; color: var(--ink-1); letter-spacing: -0.01em; line-height: 1.4; }
    .portfolio-desc { font-size: 12px; color: var(--ink-3); line-height: 1.6; margin-top: 2px; }

    .portfolio-detail { display: flex; flex-direction: column; gap: 18px; animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .portfolio-detail-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: linear-gradient(180deg, rgba(35, 47, 73, 0.7) 0%, rgba(20, 30, 50, 0.85) 100%); border: 1px solid var(--border); border-radius: 4px; box-shadow: var(--shadow-soft); }
    .portfolio-back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: rgba(25, 35, 55, 0.6); border: 1px solid var(--border-soft); border-radius: 2px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; color: var(--ink-2); cursor: pointer; transition: all 0.2s; }
    .portfolio-back-btn:hover { background: rgba(45, 60, 95, 0.8); border-color: var(--gold); color: var(--gold-bright); transform: translateX(-2px); }
    .portfolio-detail-title { flex: 1; font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; color: var(--ink-1); letter-spacing: -0.01em; text-shadow: 0 0 12px rgba(240, 228, 197, 0.2); }
    .portfolio-external-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: rgba(25, 35, 55, 0.6); color: var(--ink-2); border: 1px solid var(--border-soft); border-radius: 2px; font-size: 12px; font-weight: 500; text-decoration: none; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
    .portfolio-external-btn:hover { background: rgba(45, 60, 95, 0.8); border-color: var(--gold); color: var(--gold-bright); transform: translateY(-1px); }

          <div class="skills-grid">${skillsHtml}</div>
        </div>
        <div class="info-card">
          <div class="section-header"><span class="section-title">보유 자격증</span></div>
          <div class="chip-group">${certsHtml}</div>
        </div>
        <div class="info-card">
          <p class="description">${d.description}</p>
        </div>
        <button class="action-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          이력서 다운로드
        </button>
      `;
    }

    function renderCareer() {
      const items = profileData.career.map(c => `
        <div class="timeline-item">
          <div class="timeline-header">
            <span class="timeline-title">${c.role}</span>
            <span class="timeline-period">${c.period}</span>
          </div>
          <div class="timeline-sub">${c.company}</div>
          <p class="timeline-desc">${c.description}</p>
        </div>
      `).join('');
      return `
        <div class="info-card name-card">
          <div class="name-row"><span class="name">경력</span></div>
          <div class="tags"><span class="tag t-element">Career History</span></div>
        </div>
        <div class="info-card">${items}</div>
      `;
    }

    function renderEducation() {
      const items = profileData.education.map(e => `
        <div class="timeline-item">
          <div class="timeline-header">
            <span class="timeline-title">${e.school}</span>
            <span class="timeline-period">${e.period}</span>
          </div>
          <div class="timeline-sub">${e.major}</div>
          <p class="timeline-desc">${e.description}</p>
        </div>
      `).join('');
      return `
        <div class="info-card name-card">
          <div class="name-row"><span class="name">대외활동</span></div>
          <div class="tags"><span class="tag t-role">Education</span></div>
        </div>
        <div class="info-card">${items}</div>
      `;
    }

    function renderAbout() {
      const d = profileData.about;
      const strengthsHtml = d.strengths.map(s => `
        <div class="timeline-item">
          <div class="timeline-title" style="margin-bottom: 4px;">${s.title}</div>
          <p class="timeline-desc">${s.desc}</p>
        </div>
      `).join('');
      const bodyHtml = d.body.split('\n').filter(p => p.trim()).map(p => `<p style="margin-bottom: 12px;">${p}</p>`).join('');
      return `
        <div class="info-card name-card">
          <div class="name-row"><span class="name">${d.headline}</span></div>
          <div class="tags"><span class="tag t-experience">About Me</span></div>
        </div>
        <div class="info-card">
          <div class="description">${bodyHtml}</div>
        </div>
        <div class="info-card">
          <div class="section-header"><span class="section-title">강점</span></div>
          ${strengthsHtml}
        </div>
      `;
    }

    let currentPortfolioId = null;

    function renderPortfolio() {
      if (currentPortfolioId !== null && profileData.portfolio[currentPortfolioId]) {
        return renderPortfolioDetail(currentPortfolioId);
      }
      return renderPortfolioList();
    }

    function renderPortfolioList() {
      const items = profileData.portfolio.map((p, i) => {
        const thumbHtml = p.thumbnail
          ? `<img src="${p.thumbnail}" alt="${p.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
             <div class="portfolio-thumbnail-placeholder" style="display:none;">
               <svg class="ph-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
               <span class="ph-text">이미지를 찾을 수 없습니다</span>
             </div>`
          : `<div class="portfolio-thumbnail-placeholder">
               <svg class="ph-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
               <span class="ph-text">${p.title}</span>
             </div>`;
        const tagHtml = p.tag ? `<div class="portfolio-badge">${p.tag}</div>` : '';
        const downloadIndicator = p.download
          ? `<div class="portfolio-download-indicator" title="다운로드 가능">
               <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
             </div>`
          : '';
        const hasInternalContent = (p.images && p.images.length > 0) || p.download;
        const clickAttr = hasInternalContent
          ? `data-portfolio-id="${i}"`
          : (p.link ? `data-portfolio-link="${p.link}"` : `data-portfolio-id="${i}"`);
        return `
          <div class="portfolio-item" ${clickAttr}>
            <div class="portfolio-thumbnail">
              ${thumbHtml}
              ${tagHtml}
              ${downloadIndicator}
            </div>
            <div class="portfolio-info">
              <div class="portfolio-title">${p.title}</div>
              ${p.description ? `<div class="portfolio-desc">${p.description}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
      return `
        <div class="info-card name-card">
          <div class="name-row"><span class="name">Portfolio</span></div>
          <div class="tags"><span class="tag t-element">Works</span></div>
        </div>
        <div class="portfolio-grid">${items}</div>
      `;
    }

    function renderPortfolioDetail(id) {
      const p = profileData.portfolio[id];
      const imagesHtml = (p.images || []).map(src =>
        `<img src="${src}" alt="${p.title}" onerror="this.style.opacity=0.3;">`
      ).join('');
      const externalBtn = p.link
        ? `<a class="portfolio-external-btn" href="${p.link}" target="_blank" rel="noopener">
             원문 보기
             <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg>
           </a>`
        : '';
      const downloadAttr = p.downloadName ? `download="${p.downloadName}"` : 'download';
      const downloadBtn = p.download
        ? `<a class="portfolio-download-btn" href="${p.download}" ${downloadAttr}>
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
             다운로드
           </a>`
        : '';
      let contentHtml;
      if (imagesHtml) {
        contentHtml = `<div class="portfolio-images">${imagesHtml}</div>`;
      } else if (p.download) {
        contentHtml = `<div class="portfolio-empty-state">상단의 <b>다운로드</b> 버튼을 통해 포트폴리오 파일을 받아보실 수 있습니다.</div>`;
      } else {
        contentHtml = `<div class="portfolio-empty-state">아직 본문이 등록되지 않았습니다.</div>`;
      }
      return `
        <div class="portfolio-detail">
          <div class="portfolio-detail-header">
            <button class="portfolio-back-btn" data-portfolio-back="1">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              목록으로
            </button>
            <div class="portfolio-detail-title">${p.title}</div>
            ${externalBtn}
            ${downloadBtn}
          </div>
          <div class="portfolio-detail-body">
            ${p.description ? `<p class="portfolio-detail-desc">${p.description}</p>` : ''}
            ${contentHtml}
          </div>
        </div>
      `;
    }

    const renderers = { basic: renderBasic, career: renderCareer, education: renderEducation, about: renderAbout, portfolio: renderPortfolio };
    const infoPanel = document.getElementById('infoPanel');
    const contentGrid = document.querySelector('.content-grid');

    function switchTab(tabId) {
      document.querySelectorAll('.menu-item').forEach(m => {
        m.classList.toggle('active', m.dataset.tab === tabId);
      });
      contentGrid.classList.toggle('portfolio-mode', tabId === 'portfolio');
      if (tabId !== 'portfolio') currentPortfolioId = null;
      infoPanel.style.animation = 'none';
      infoPanel.offsetHeight;
      infoPanel.innerHTML = renderers[tabId]();
      infoPanel.style.animation = 'fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('sideMenu').addEventListener('click', (e) => {
      const btn = e.target.closest('.menu-item');
      if (btn) switchTab(btn.dataset.tab);
    });

    document.getElementById('homeBtn').addEventListener('click', () => {
      switchTab('basic');
    });

    infoPanel.addEventListener('click', (e) => {
      const item = e.target.closest('[data-portfolio-id]');
      if (item) {
        currentPortfolioId = parseInt(item.dataset.portfolioId, 10);
        switchTab('portfolio');
        return;
      }
      const linkItem = e.target.closest('[data-portfolio-link]');
      if (linkItem) {
        window.open(linkItem.dataset.portfolioLink, '_blank', 'noopener');
        return;
      }
      const backBtn = e.target.closest('[data-portfolio-back]');
      if (backBtn) {
        currentPortfolioId = null;
        switchTab('portfolio');
      }
    });

    switchTab('basic');
  </script>
</body>
</html>

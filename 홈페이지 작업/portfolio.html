<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARK SEYEON | Portfolio</title>

  <!-- 폰트: Pretendard (한글) + JetBrains Mono (숫자/영문 게임UI 느낌) + Gowun Dodum (디스플레이) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Gowun+Dodum&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

  <style>
    /* =========================
       전역 스타일 - 게임 UI 톤
       ========================= */
    :root {
      /* ── 원신 스타일 다크 네이비 베이스 ── */
      --bg-base: #1A2438;          /* 다크 네이비 (전체 배경) */
      --bg-tint: #243152;          /* 살짝 밝은 네이비 */
      --bg-deep: #0F1626;          /* 가장 진한 톤 (그라데이션용) */

      /* ── 패널 (어두운 반투명) ── */
      --panel: rgba(25, 35, 55, 0.92);       /* 카드 배경 */
      --panel-soft: rgba(35, 47, 73, 0.75);  /* 카드 내부 강조 영역 */
      --panel-hover: rgba(40, 55, 85, 0.92); /* 호버 시 */

      /* ── 텍스트 (크림/베이지 톤) ── */
      --ink-1: #F0E4C5;            /* 메인 텍스트 (밝은 크림) */
      --ink-2: #D9CBA3;            /* 본문 (베이지) */
      --ink-3: #A89A78;            /* 보조 텍스트 */
      --ink-4: #6B6650;            /* 캡션·플레이스홀더 */

      /* ── 골드 액센트 (헤더·트림·강조) ── */
      --gold: #D4A847;             /* 메인 골드 */
      --gold-bright: #F2C46D;      /* 하이라이트 골드 */
      --gold-deep: #8F6F1F;        /* 다크 골드 (보더용) */
      --gold-soft: rgba(212, 168, 71, 0.15); /* 골드 글로우 */

      /* ── 블루 액센트 (게이지·강조) ── */
      --blue-vivid: #5BAEE0;       /* 하늘색 (게이지) */
      --blue-deep: #2D5A8C;        /* 진한 블루 */

      /* ── 보더·그림자 ── */
      --border: rgba(212, 168, 71, 0.4);
      --border-soft: rgba(212, 168, 71, 0.2);
      --border-bright: rgba(242, 196, 109, 0.6);
      --shadow-soft: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(212, 168, 71, 0.15) inset;
      --shadow-glow: 0 0 16px rgba(212, 168, 71, 0.25);

      /* ── 레거시 변수 (기존 코드 호환) ── */
      --bg-warm-1: var(--bg-base);
      --bg-warm-2: var(--bg-tint);
      --bg-warm-3: var(--bg-deep);
      --accent: var(--gold);
      --accent-deep: var(--gold-deep);
      --accent-soft: var(--gold-soft);
      --accent-gold: var(--gold);
      --accent-gold-deep: var(--gold-deep);
      --accent-blue: var(--blue-vivid);
      --blue-mid: var(--blue-deep);
      --blue-soft: rgba(91, 174, 224, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Noto Sans KR', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink-1);
      background:
        radial-gradient(ellipse at top left, rgba(45, 70, 120, 0.4) 0%, transparent 60%),
        radial-gradient(ellipse at bottom right, rgba(15, 22, 38, 0.8) 0%, transparent 60%),
        linear-gradient(135deg, var(--bg-base) 0%, var(--bg-deep) 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 배경 텍스처 (살짝 골드 글로우) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(212, 168, 71, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(91, 174, 224, 0.05) 0%, transparent 50%);
      z-index: 0;
    }

    /* =========================
       메인 프레임 — 가로형 풀스크린 레이아웃
       ========================= */
    .game-frame {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    /* =========================
       상단 헤더 바
       ========================= */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background:
        linear-gradient(180deg, rgba(25, 35, 55, 0.85) 0%, rgba(15, 22, 38, 0.85) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(212, 168, 71, 0.15);
      margin-bottom: 24px;
      position: relative;
    }

    /* 헤더 상단 골드 라인 */
    .top-bar::before {
      content: '';
      position: absolute;
      top: 4px; left: 16px; right: 16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }

    /* 헤더 양끝 다이아몬드 장식 */
    .top-bar::after {
      content: '◆';
      position: absolute;
      top: -1px; right: 50%;
      transform: translateX(50%);
      color: var(--gold);
      font-size: 8px;
      text-shadow: 0 0 8px var(--gold);
    }

    .top-bar-title {
      font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.4em;
      color: var(--ink-1);
      text-transform: uppercase;
      position: relative;
      padding-left: 20px;
      text-shadow: 0 0 12px rgba(240, 228, 197, 0.3);
    }
    .top-bar-title::before {
      content: '◆';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-55%);
      color: var(--gold);
      font-size: 12px;
      text-shadow: 0 0 8px var(--gold);
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .home-btn {
      width: 36px; height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(25, 35, 55, 0.6);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--gold);
    }
    .home-btn:hover {
      background: rgba(45, 60, 95, 0.8);
      border-color: var(--gold-bright);
      box-shadow: var(--shadow-glow);
      transform: translateY(-1px);
    }

    /* =========================
       메인 콘텐츠 그리드 — 가로형 비율
       ========================= */
    .content-grid {
      display: grid;
      grid-template-columns: 140px 1.1fr 1.3fr;
      gap: 24px;
      flex: 1;
      min-height: 620px;
    }

    /* =========================
       좌측 메뉴
       ========================= */
    .side-menu {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 16px 8px;
    }

    .menu-item {
      padding: 14px 8px;
      text-align: center;
      font-family: 'Noto Serif KR', serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-3);
      background: transparent;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    .menu-item:hover {
      color: var(--ink-1);
      background: rgba(212, 168, 71, 0.08);
    }
    .menu-item.active {
      background: linear-gradient(135deg, rgba(212, 168, 71, 0.15) 0%, rgba(212, 168, 71, 0.05) 100%);
      color: var(--gold-bright);
      font-weight: 700;
      box-shadow: inset 0 0 0 1px var(--border);
      text-shadow: 0 0 10px rgba(242, 196, 109, 0.4);
    }
    .menu-item.active::before {
      content: '';
      position: absolute;
      left: -3px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 24px;
      background: linear-gradient(180deg, var(--gold-bright), var(--gold));
      border-radius: 4px 0 0 4px;
      box-shadow: 0 0 8px var(--gold);
    }
    /* 액티브 메뉴 우측 다이아몬드 장식 */
    .menu-item.active::after {
      content: '◆';
      position: absolute;
      right: 6px; top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 6px;
      opacity: 0.6;
    }

    /* =========================
       중앙 캐릭터 디스플레이
       ========================= */
    .character-display {
      background:
        linear-gradient(180deg, rgba(35, 47, 73, 0.7) 0%, rgba(20, 30, 50, 0.85) 100%);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
      aspect-ratio: 3 / 4;
      align-self: start;
      width: 100%;
    }

    /* 캐릭터 영역 상단 골드 라인 + 다이아몬드 */
    .character-display::after {
      content: '◆';
      position: absolute;
      top: 6px; left: 50%;
      transform: translateX(-50%);
      color: var(--gold);
      font-size: 10px;
      text-shadow: 0 0 6px var(--gold);
      z-index: 3;
    }

    /* 캐릭터 배경 후광 (골드 글로우) */
    .character-display::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(212, 168, 71, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* 코너 장식 (골드, 더 정교한 L자) */
    .corner {
      position: absolute;
      width: 28px; height: 28px;
      border: 1.5px solid var(--gold);
      opacity: 0.7;
      z-index: 2;
    }
    .corner.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
    .corner.tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
    .corner.bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
    .corner.br { bottom: 12px; right: 12px; border-left: none; border-top: none; }
    .corner.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
    .corner.tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
    .corner.bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
    .corner.br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

    .character-image {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      object-fit: cover;
      object-position: center top;
      position: relative;
      z-index: 1;
      background: var(--panel-soft);
    }

    /* 이미지 없을 때 placeholder */
    .character-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      background: repeating-linear-gradient(
        135deg,
        rgba(212, 168, 71, 0.06),
        rgba(212, 168, 71, 0.06) 10px,
        rgba(212, 168, 71, 0.02) 10px,
        rgba(212, 168, 71, 0.02) 20px
      );
      border: 1px dashed var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--ink-3);
      position: relative;
      z-index: 1;
    }
    .character-placeholder svg { opacity: 0.5; color: var(--gold); }
    .character-placeholder .label {
      font-family: 'Noto Serif KR', serif;
      font-size: 13px; font-weight: 500;
      color: var(--ink-2);
      letter-spacing: 0.08em;
    }
    .character-placeholder .hint { font-size: 11px; color: var(--ink-4); opacity: 0.7; }
    .character-placeholder svg { opacity: 0.5; }
    .character-placeholder .label { font-size: 13px; font-weight: 500; }
    .character-placeholder .hint { font-size: 11px; color: var(--ink-3); opacity: 0.7; }

    /* =========================
       우측 정보 패널
       ========================= */
    .info-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .info-card {
      background:
        linear-gradient(180deg, rgba(35, 47, 73, 0.7) 0%, rgba(20, 30, 50, 0.85) 100%);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 18px 20px;
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(212, 168, 71, 0.1);
      position: relative;
    }

    /* 카드 상단 골드 라인 장식 */
    .info-card::before {
      content: '';
      position: absolute;
      top: 6px; left: 12px; right: 12px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-soft), transparent);
      opacity: 0.6;
    }

    /* 이름 + 레벨 헤더 */
    .name-card {
      padding: 22px 24px 18px;
    }
    .name-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .name-row .name {
      font-family: 'Noto Serif KR', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink-1);
      text-shadow: 0 0 12px rgba(240, 228, 197, 0.2);
    }
    .name-row .level {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--gold-bright);
      letter-spacing: 0.1em;
      text-shadow: 0 0 8px rgba(242, 196, 109, 0.4);
    }

    .stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }
    .stars .star {
      width: 14px; height: 14px;
      color: var(--gold-bright);
      filter: drop-shadow(0 0 4px rgba(242, 196, 109, 0.5));
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      padding: 4px 14px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 2px;
      letter-spacing: 0.08em;
      border: 1px solid var(--border);
      background: rgba(25, 35, 55, 0.6);
      color: var(--ink-2);
    }
    .tag.t-element {
      border-color: rgba(91, 174, 224, 0.5);
      color: var(--blue-vivid);
    }
    .tag.t-role {
      border-color: var(--border);
      color: var(--gold-bright);
    }
    .tag.t-experience {
      border-color: rgba(216, 203, 163, 0.4);
      color: var(--ink-2);
    }

    /* 능력치 섹션 */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-soft);
      position: relative;
    }
    .section-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 40px; height: 1px;
      background: var(--gold);
      box-shadow: 0 0 4px var(--gold);
    }
    .section-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--gold-bright);
      letter-spacing: 0.12em;
      text-shadow: 0 0 8px rgba(242, 196, 109, 0.3);
    }
    .section-action {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-3);
      padding: 3px 10px;
      background: rgba(25, 35, 55, 0.6);
      border: 1px solid var(--border-soft);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .section-action:hover {
      color: var(--gold-bright);
      border-color: var(--gold);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      font-size: 13.5px;
      border-bottom: 1px dashed var(--border-soft);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink-2);
      font-weight: 400;
    }
    .stat-icon {
      width: 18px; height: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--gold);
    }
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-1);
      letter-spacing: 0.02em;
    }
    .stat-value.email { color: var(--ink-1); }

    /* 기술 게이지 (가로 바 형식) */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px 28px;
    }
    .skill-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 0;
    }
    .skill-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-2);
      letter-spacing: 0.02em;
      width: 78px;
      flex-shrink: 0;
    }
    .skill-gauge {
      flex: 1;
      height: 6px;
      background: rgba(15, 22, 38, 0.6);
      border: 1px solid var(--border-soft);
      border-radius: 1px;
      overflow: hidden;
      position: relative;
    }
    .skill-gauge-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-bright) 100%);
      border-radius: 0;
      transform-origin: left center;
      animation: fillGauge 0.7s cubic-bezier(0.16, 1, 0.3, 1) backwards;
      box-shadow: 0 0 8px rgba(242, 196, 109, 0.5);
    }
    @keyframes fillGauge {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    /* 자격증 칩 (기존 유지) */
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .skill-chip {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      background: var(--panel-soft);
      color: var(--ink-1);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.02em;
    }
    .cert-chip {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(25, 35, 55, 0.6);
      color: var(--gold-bright);
      border: 1px solid var(--border);
      border-radius: 2px;
      letter-spacing: 0.04em;
    }

    /* 설명 텍스트 */
    .description {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--ink-2);
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* 경력 / 교육 카드 */
    .timeline-item {
      padding: 14px 0;
      border-bottom: 1px dashed var(--border-soft);
    }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
      gap: 12px;
    }
    .timeline-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 14.5px;
      font-weight: 700;
      color: var(--ink-1);
      letter-spacing: -0.01em;
    }
    .timeline-period {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--gold);
      font-weight: 500;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }
    .timeline-sub {
      font-size: 12.5px;
      color: var(--ink-3);
      margin-bottom: 6px;
      font-weight: 400;
    }
    .timeline-desc {
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--ink-2);
    }

    /* 액션 버튼 (이력서 다운로드) */
    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      background: linear-gradient(180deg, rgba(212, 168, 71, 0.2) 0%, rgba(143, 111, 31, 0.3) 100%);
      color: var(--gold-bright);
      border: 1px solid var(--gold);

      // 각 항목은 썸네일과 함께 갤러리에 표시되고, 클릭하면 전체 화면 상세 보기로 이동합니다.
      //
      // 📌 가장 자주 쓰는 시나리오 (스크린샷 + 파일 다운로드):
      //    1) 엑셀/PPT의 핵심 내용을 스크린샷으로 찍어 images에 등록
      //    2) 원본 파일(xlsx, pptx, pdf 등)을 download에 등록
      //    → 방문자는 상세 화면에서 스크린샷을 보고, "다운로드" 버튼으로 원본 받음
      //
      // 필드 설명:
      //   title         : 포트폴리오 제목 (필수)
      //   thumbnail     : 갤러리 카드에 표시되는 썸네일 이미지 경로
      //   description   : 짧은 설명 (1~2줄)
      //   tag           : 분류 태그 (예: "역기획", "데이터 분석")
      //   images        : 상세 화면에 표시되는 본문 스크린샷 이미지들 (배열)
      //   link          : 외부 URL (Notion, Figma 등) → 상세 화면에 "원문 보기" 버튼
      //   download      : 다운로드 파일 경로 (xlsx, pdf, pptx, zip 등 모든 파일 형식 OK)
      //   downloadName  : (선택) 다운로드 시 저장될 파일명
      portfolio: [
        {
          // ▼ 예시 1: 스크린샷 + 엑셀 다운로드 (데이터 분석 작업물)

          images: [

            "images/portfolio/nextwave-2.png",   // 차트 스크린샷
            "images/portfolio/nextwave-3.png"    // 결론 스크린샷
          ],
          download: "files/nextwave-analysis.xlsx",
          downloadName: "박세연_NextWave_분석.xlsx"
        },
        {
          // ▼ 예시 2: 스크린샷 + PDF 다운로드 (역기획서)
          title: "블루 아카이브 확대 장비 역기획서",
          thumbnail: "images/portfolio/ba-thumb.png",
          description: "블루 아카이브의 장비 시스템 역기획 및 인덱스 구조화",
          tag: "역기획",
          images: [
            "images/portfolio/ba-1.png",
            "images/portfolio/ba-2.png"
          ],
          download: "files/ba-reverse-spec.pdf",
          downloadName: "박세연_블루아카이브_역기획.pdf"
        },
        {
          // ▼ 예시 3: 스크린샷만 (다운로드 없이 보기만)
          title: "두근두근타운 게임 분석 및 개선안",
          thumbnail: "images/portfolio/dukdok-thumb.png",
          description: "라이프 시뮬레이션 게임의 시스템 구조 분석과 신규 시스템 제안",
          tag: "게임 분석",

        {
          // ▼ 예시 4: 외부 링크만 (Notion, Figma 등)

          thumbnail: "images/portfolio/stardew-thumb.png",

    };

    /* ════════════════════════════════════════════════════════════════════
       🔒 아래는 위 데이터를 화면에 그리는 렌더링 코드입니다.
       구조를 바꾸지 않을 거라면 건드리지 않아도 됩니다.
       ════════════════════════════════════════════════════════════════════ */

    // 상단 타이틀 적용
    document.getElementById('topBarTitle').textContent = profileData.title;

    // 캐릭터 이미지 적용 (경로가 있으면 이미지, 없으면 placeholder 유지)
    if (profileData.image) {
      const wrap = document.getElementById('characterImageWrap');
      wrap.innerHTML = `<img class="character-image" src="${profileData.image}" alt="${profileData.basic.name}">`;
    }

    // ─── 외형 설정 적용 (배경 이미지 + 폰트) ───
    (function applyAppearance() {
      const a = profileData.appearance || {};

      // 1) 배경 이미지 적용 — 별도 고정 레이어로 깔아서 블러/채도가 UI에 영향 X
      if (a.backgroundImage) {
        const overlay    = Math.max(0, Math.min(1, a.backgroundOverlay ?? 0.7));
        const blur       = Math.max(0, a.backgroundBlur ?? 0);
        const saturation = Math.max(0, a.backgroundSaturation ?? 1);

        // 배경 전용 레이어 (가장 뒤에 깔림, 블러는 이 레이어에만)
        const bgLayer = document.createElement('div');
        bgLayer.style.cssText = `
          position: fixed;
          inset: 0;
          z-index: -2;
          background: url("${a.backgroundImage}") center/cover no-repeat;
          filter: blur(${blur}px) saturate(${saturation});
          transform: scale(${blur > 0 ? 1.05 : 1});
        `;
        document.body.appendChild(bgLayer);

        // 다크 오버레이 (블러 위에 덮이는 어둡힘, 원신 UI 톤)
        const overlayLayer = document.createElement('div');
        overlayLayer.style.cssText = `
          position: fixed;
          inset: 0;
          z-index: -1;
          background: linear-gradient(
            135deg,
            rgba(15, 22, 38, ${overlay}) 0%,
            rgba(26, 36, 56, ${overlay * 0.85}) 100%
          );
          pointer-events: none;
        `;
        document.body.appendChild(overlayLayer);

        // body 자체의 배경은 제거 (배경 레이어가 대신함)
        document.body.style.background = 'transparent';
      }

      // 2) 사용자 폰트 적용
      if (a.fontName) {
        if (a.fontUrl) {
          const style = document.createElement('style');
          style.textContent = `
            @font-face {
              font-family: "${a.fontName}";
              src: url("${a.fontUrl}") format("woff2"),
                   url("${a.fontUrl}") format("woff"),
                   url("${a.fontUrl}") format("truetype"),
                   url("${a.fontUrl}") format("opentype");
              font-display: swap;
            }
          `;
          document.head.appendChild(style);
        }
        document.body.style.fontFamily = `"${a.fontName}", 'Noto Sans KR', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif`;
      }
    })();

    // 아이콘 SVG
    const icons = {
      cake: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21V13H4v8M2 21h20M16 8a4 4 0 00-8 0M12 3v5"/></svg>`,
      mail: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 6l-10 7L2 6"/></svg>`,
      phone: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>`,
      star: `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
    };

    // 탭별 렌더링 함수
    function renderBasic() {
      const d = profileData.basic;
      const starsHtml = Array.from({ length: 5 }, (_, i) =>
        `<span class="star" style="opacity:${i < d.stars ? 1 : 0.2}">${icons.star}</span>`
      ).join('');

      const tagsHtml = d.tags.map(t => `<span class="tag t-${t.type}">${t.label}</span>`).join('');

      const statsHtml = d.stats.map(s => `
        <div class="stat-row">
          <span class="stat-label"><span class="stat-icon">${icons[s.icon]}</span>${s.label}</span>
          <span class="stat-value ${s.isEmail ? 'email' : ''}">${s.value}</span>
        </div>
      `).join('');

      const skillsHtml = d.skills.map((s, i) => {
        // 0~100 범위로 클램핑한 후 게이지 바의 너비로 사용
        const level = Math.max(0, Math.min(100, s.level));
        // 스킬마다 약간의 딜레이를 주어 순차적으로 채워지는 애니메이션
        const delay = i * 70;
        return `
          <div class="skill-row">
            <span class="skill-name">${s.name}</span>
            <div class="skill-gauge">
              <div class="skill-gauge-fill" style="width: ${level}%; animation-delay: ${delay}ms"></div>
            </div>
          </div>
        `;
      }).join('');
      const certsHtml = d.certifications.map(c => `<span class="cert-chip">${c}</span>`).join('');

      return `
        <div class="info-card name-card">
          <div class="name-row">
            <span class="name">${d.name}</span>
            <span class="level">Lv.${d.level}</span>
          </div>
          <div class="stars">${starsHtml}</div>
          <div class="tags">${tagsHtml}</div>
        </div>

        <div class="info-card">
          <div class="section-header">
            <span class="section-title">능력치</span>
            <span class="section-action">상세 정보</span>
          </div>
          ${statsHtml}
        </div>

        <div class="info-card">
          <div class="section-header"><span class="section-title">보유 기술</span></div>
          <div class="skills-grid">${skillsHtml}</div>
        </div>

        <div class="info-card">
          <div class="section-header"><span class="section-title">보유 자격증</span></div>
          <div class="chip-group">${certsHtml}</div>
        </div>

        <div class="info-card">
          <p class="description">${d.description}</p>
        </div>

        <button class="action-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          이력서 다운로드
        </button>
      `;
    }

    function renderCareer() {
      const items = profileData.career.map(c => `
        <div class="timeline-item">
          <div class="timeline-header">
            <span class="timeline-title">${c.role}</span>
            <span class="timeline-period">${c.period}</span>
          </div>
          <div class="timeline-sub">${c.company}</div>
          <p class="timeline-desc">${c.description}</p>
        </div>
      `).join('');

      return `
        <div class="info-card name-card">
          <div class="name-row">
            <span class="name">경력</span>
          </div>
          <div class="tags">
            <span class="tag t-element">Career History</span>
          </div>
        </div>
        <div class="info-card">${items}</div>
      `;
    }

    function renderEducation() {
      const items = profileData.education.map(e => `
        <div class="timeline-item">
          <div class="timeline-header">
            <span class="timeline-title">${e.school}</span>
            <span class="timeline-period">${e.period}</span>
          </div>
          <div class="timeline-sub">${e.major}</div>
          <p class="timeline-desc">${e.description}</p>
        </div>
      `).join('');

      return `
        <div class="info-card name-card">
          <div class="name-row">
            <span class="name">대외활동</span>
          </div>
          <div class="tags">
            <span class="tag t-role">Education</span>
          </div>
        </div>
        <div class="info-card">${items}</div>
      `;
    }

    function renderAbout() {
      const d = profileData.about;
      const strengthsHtml = d.strengths.map(s => `
        <div class="timeline-item">
          <div class="timeline-title" style="margin-bottom: 4px;">${s.title}</div>
          <p class="timeline-desc">${s.desc}</p>
        </div>
      `).join('');

      const bodyHtml = d.body.split('\n').filter(p => p.trim()).map(p => `<p style="margin-bottom: 12px;">${p}</p>`).join('');

      return `
        <div class="info-card name-card">
          <div class="name-row">
            <span class="name">${d.headline}</span>
          </div>
          <div class="tags">
            <span class="tag t-experience">About Me</span>
          </div>
        </div>
        <div class="info-card">
          <div class="description">${bodyHtml}</div>
        </div>
        <div class="info-card">
          <div class="section-header"><span class="section-title">강점</span></div>
          ${strengthsHtml}
        </div>
      `;
    }

    /* ────── 포트폴리오 탭 ────── */
    // 현재 열려있는 포트폴리오 인덱스 (null이면 리스트 화면)
    let currentPortfolioId = null;

    function renderPortfolio() {
      // 특정 포트폴리오를 보고 있으면 상세 화면, 아니면 갤러리
      if (currentPortfolioId !== null && profileData.portfolio[currentPortfolioId]) {
        return renderPortfolioDetail(currentPortfolioId);
      }
      return renderPortfolioList();
    }

    function renderPortfolioList() {
      const items = profileData.portfolio.map((p, i) => {
        // 썸네일이 있으면 이미지, 없으면 placeholder
        const thumbHtml = p.thumbnail
          ? `<img src="${p.thumbnail}" alt="${p.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
             <div class="portfolio-thumbnail-placeholder" style="display:none;">
               <svg class="ph-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
               <span class="ph-text">이미지를 찾을 수 없습니다</span>
             </div>`
          : `<div class="portfolio-thumbnail-placeholder">
               <svg class="ph-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
               <span class="ph-text">${p.title}</span>
             </div>`;

        const tagHtml = p.tag ? `<div class="portfolio-badge">${p.tag}</div>` : '';

        // 다운로드 파일이 있으면 카드 우측 하단에 다운로드 아이콘 표시
        const downloadIndicator = p.download
          ? `<div class="portfolio-download-indicator" title="다운로드 가능">
               <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
             </div>`
          : '';

        // 클릭 동작 결정:
        //   images나 download가 있으면 → 내부 상세 화면
        //   link만 있으면 → 새 창에서 link 열기
        //   그 외 → 내부 상세 화면 (description만 보임)
        const hasInternalContent = (p.images && p.images.length > 0) || p.download;
        const clickAttr = hasInternalContent
          ? `data-portfolio-id="${i}"`
          : (p.link ? `data-portfolio-link="${p.link}"` : `data-portfolio-id="${i}"`);

        return `
          <div class="portfolio-item" ${clickAttr}>
            <div class="portfolio-thumbnail">
              ${thumbHtml}
              ${tagHtml}
              ${downloadIndicator}
            </div>
            <div class="portfolio-info">
              <div class="portfolio-title">${p.title}</div>
              ${p.description ? `<div class="portfolio-desc">${p.description}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="info-card name-card">
          <div class="name-row">
            <span class="name">Portfolio</span>
          </div>
          <div class="tags">
            <span class="tag t-element">Works</span>
          </div>
        </div>
        <div class="portfolio-grid">${items}</div>
      `;
    }

    function renderPortfolioDetail(id) {
      const p = profileData.portfolio[id];
      const imagesHtml = (p.images || []).map(src =>
        `<img src="${src}" alt="${p.title}" onerror="this.style.opacity=0.3;">`
      ).join('');

      // 외부 링크 버튼 (Notion 등)
      const externalBtn = p.link
        ? `<a class="portfolio-external-btn" href="${p.link}" target="_blank" rel="noopener">
             원문 보기
             <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg>
           </a>`
        : '';

      // 다운로드 버튼 (PDF 등 파일 다운로드)
      // HTML5의 download 속성을 사용해 브라우저가 파일을 저장하도록 유도
      const downloadAttr = p.downloadName ? `download="${p.downloadName}"` : 'download';
      const downloadBtn = p.download
        ? `<a class="portfolio-download-btn" href="${p.download}" ${downloadAttr}>
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
             다운로드
           </a>`
        : '';

      // 본문 영역: 이미지가 있으면 이미지 나열, 없으면 안내 (다운로드 파일만 있는 경우 메시지 다르게)
      let contentHtml;
      if (imagesHtml) {
        contentHtml = `<div class="portfolio-images">${imagesHtml}</div>`;
      } else if (p.download) {
        contentHtml = `
          <div class="portfolio-empty-state">
            상단의 <b>다운로드</b> 버튼을 통해 포트폴리오 파일을 받아보실 수 있습니다.
          </div>`;
      } else {
        contentHtml = `
          <div class="portfolio-empty-state">
            아직 본문이 등록되지 않았습니다.<br>
            <code style="font-family: 'JetBrains Mono', monospace; font-size: 12px;">profileData.portfolio[${id}]</code> 에 <code>images</code> 또는 <code>download</code> 를 추가하세요.
          </div>`;
      }

      return `
        <div class="portfolio-detail">
          <div class="portfolio-detail-header">
            <button class="portfolio-back-btn" data-portfolio-back="1">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              목록으로
            </button>
            <div class="portfolio-detail-title">${p.title}</div>
            ${externalBtn}
            ${downloadBtn}
          </div>
          <div class="portfolio-detail-body">
            ${p.description ? `<p class="portfolio-detail-desc">${p.description}</p>` : ''}
            ${contentHtml}
          </div>
        </div>
      `;
    }

    // 탭 전환
    const renderers = { basic: renderBasic, career: renderCareer, education: renderEducation, about: renderAbout, portfolio: renderPortfolio };
    const infoPanel = document.getElementById('infoPanel');
    const contentGrid = document.querySelector('.content-grid');

    function switchTab(tabId) {
      // 메뉴 active 상태 변경
      document.querySelectorAll('.menu-item').forEach(m => {
        m.classList.toggle('active', m.dataset.tab === tabId);
      });

      // 포트폴리오 모드 토글 (캐릭터 이미지 숨김 + 그리드 확장)
      contentGrid.classList.toggle('portfolio-mode', tabId === 'portfolio');

      // 다른 탭으로 전환되면 열려있던 포트폴리오 상세를 닫음
      if (tabId !== 'portfolio') {
        currentPortfolioId = null;
      }

      // 패널 페이드아웃 → 콘텐츠 변경 → 페이드인
      infoPanel.style.animation = 'none';
      infoPanel.offsetHeight; // reflow
      infoPanel.innerHTML = renderers[tabId]();
      infoPanel.style.animation = 'fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)';

      // 상단으로 스크롤 (상세 화면에서 목록으로 돌아갈 때 자연스럽게)
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 메뉴 클릭 이벤트
    document.getElementById('sideMenu').addEventListener('click', (e) => {
      const btn = e.target.closest('.menu-item');
      if (btn) switchTab(btn.dataset.tab);
    });

    // 홈 버튼 클릭 → 초기 화면(기본 정보 탭)으로 복귀 (포트폴리오 상태도 초기화됨)
    document.getElementById('homeBtn').addEventListener('click', () => {
      switchTab('basic');
    });

    // 포트폴리오 인터랙션 (이벤트 위임)
    infoPanel.addEventListener('click', (e) => {
      // 목록에서 항목 클릭 → 상세 화면으로
      const item = e.target.closest('[data-portfolio-id]');
      if (item) {
        currentPortfolioId = parseInt(item.dataset.portfolioId, 10);
        switchTab('portfolio');
        return;
      }
      // 외부 링크 항목 클릭 → 새 창에서 열기
      const linkItem = e.target.closest('[data-portfolio-link]');
      if (linkItem) {
        window.open(linkItem.dataset.portfolioLink, '_blank', 'noopener');
        return;
      }
      // 뒤로가기 버튼 → 목록으로
      const backBtn = e.target.closest('[data-portfolio-back]');
      if (backBtn) {
        currentPortfolioId = null;
        switchTab('portfolio');
      }
    });

    // 첫 진입 시 기본 정보 표시
    switchTab('basic');
  </script>
</body>
</html>
